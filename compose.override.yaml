services:
  app:
    image: prix_excellence_cs
    build:
      context: .
      target: frankenphp_dev
    volumes:
      - ./:/app:Z
      - ./frankenphp/Caddyfile:/etc/frankenphp/Caddyfile:ro,Z
      - ./frankenphp/conf.d/20-app.dev.ini:/usr/local/etc/php/app.conf.d/20-app.dev.ini:ro,Z
    environment:
      APP_ENV: dev
      DEFAULT_URI: "http://localhost/excellence"
      FRANKENPHP_WORKER_CONFIG: watch
      XDEBUG_MODE: "${XDEBUG_MODE:-off}"
    extra_hosts:
      - host.docker.internal:host-gateway
    tty: true
