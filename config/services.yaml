parameters:
    uploads_directory: "%kernel.project_dir%/public/uploads/documents/"

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: "../src/"
        exclude:
            - "../src/DependencyInjection/"
            - "../src/Entity/"
            - "../src/Enum/"
            - "../src/Kernel.php"

    # Rate limiter
    Symfony\Component\RateLimiter\RateLimiterFactory $demandeSubmissionLimiter:
        alias: limiter.demande_submission
